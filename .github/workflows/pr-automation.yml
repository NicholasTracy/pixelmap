name: PR automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]

concurrency:
  group: pr-automation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-paths:
    name: Label by paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
          dot: true

  label-size:
    name: Label by size
    runs-on: ubuntu-latest
    steps:
      - name: Compute diff size and label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;

            // Exclude noisy generated / vendor blobs from size
            const exclude = [
              /^components\/web_ui\/vendor\//,
              /\.min\.(js|css)$/,
              /package-lock\.json$/,
              /yarn\.lock$/,
            ];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: number, per_page: 100,
            });

            let additions = 0;
            let deletions = 0;
            let countedFiles = 0;
            for (const f of files) {
              if (exclude.some((re) => re.test(f.filename))) continue;
              additions += f.additions || 0;
              deletions += f.deletions || 0;
              countedFiles += 1;
            }
            const total = additions + deletions;

            const tiers = [
              { name: 'size/XS', max: 30, color: '0e8a16' },
              { name: 'size/S', max: 100, color: '7cfc00' },
              { name: 'size/M', max: 300, color: 'fbca04' },
              { name: 'size/L', max: 800, color: 'd93f0b' },
              { name: 'size/XL', max: Infinity, color: 'b60205' },
            ];
            const tier = tiers.find((t) => total <= t.max) || tiers[tiers.length - 1];

            const existing = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner, repo, issue_number: number, per_page: 100,
            });
            const sizeNames = tiers.map((t) => t.name);
            for (const lab of existing) {
              if (sizeNames.includes(lab.name) && lab.name !== tier.name) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: number, name: lab.name,
                }).catch(() => {});
              }
            }

            await github.rest.issues.createLabel({
              owner, repo, name: tier.name, color: tier.color,
              description: `PR diff size bucket`,
            }).catch(() => {});

            const has = existing.some((l) => l.name === tier.name);
            if (!has) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: number, labels: [tier.name],
              });
            }

            core.info(`PR #${number}: ${total} lines across ${countedFiles} files → ${tier.name}`);
            core.setOutput('size', tier.name);
            core.setOutput('total', String(total));
            core.setOutput('files', String(countedFiles));

  triage-comment:
    name: Review triage comment
    runs-on: ubuntu-latest
    needs: [label-paths, label-size]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and upsert triage comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;
            const marker = '<!-- pixelmap-pr-triage -->';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: number, per_page: 100,
            });

            const areas = {
              'Web UI': (p) => p.startsWith('components/web_ui/'),
              'Wi‑Fi / security': (p) => p.startsWith('components/wifi_mgr/') || p.startsWith('components/security/'),
              'Config / boot': (p) => p.startsWith('components/config_store/') || p.startsWith('main/'),
              'LEDs / effects': (p) => /components\/(led_driver|color|effects|effect_lua|lua|pov|status_led)\//.test(p),
              'Mapping': (p) => p.startsWith('components/mapping/') || p.startsWith('components/map_store/'),
              'Art-Net / sACN': (p) => p.startsWith('components/artnet/') || p.startsWith('components/sacn/'),
              'Audio': (p) => p.startsWith('components/audio/'),
              'OTA': (p) => p.startsWith('components/ota_update/'),
              'Docs': (p) => p.startsWith('docs/') || p === 'README.md' || p.endsWith('.md'),
              'CI / GitHub': (p) => p.startsWith('.github/'),
              'Tools': (p) => p.startsWith('tools/'),
            };

            const hit = Object.entries(areas)
              .filter(([, pred]) => files.some((f) => pred(f.filename)))
              .map(([name]) => name);

            const top = files
              .slice()
              .sort((a, b) => (b.additions + b.deletions) - (a.additions + a.deletions))
              .slice(0, 12)
              .map((f) => `| \`${f.filename}\` | +${f.additions} / −${f.deletions} |`)
              .join('\n');

            const issue = await github.rest.issues.get({ owner, repo, issue_number: number });
            const labels = (issue.data.labels || []).map((l) => (typeof l === 'string' ? l : l.name));
            const size = labels.find((n) => n.startsWith('size/')) || 'pending';

            const checklist = [];
            if (hit.includes('Web UI') || hit.includes('Wi‑Fi / security')) {
              checklist.push('- [ ] SoftAP / setup wizard or Network tab still usable');
            }
            if (hit.includes('LEDs / effects') || hit.includes('Mapping')) {
              checklist.push('- [ ] Spatial effect / map still renders as expected');
            }
            if (hit.includes('Art-Net / sACN')) {
              checklist.push('- [ ] Live DMX still overrides local effects when streaming');
            }
            if (hit.includes('OTA')) {
              checklist.push('- [ ] OTA path still accepts app `.bin` (not merged image)');
            }
            if (hit.includes('Docs') && hit.length === 1) {
              checklist.push('- [ ] Wording matches current product behavior');
            }
            if (checklist.length === 0) {
              checklist.push('- [ ] Smoke-check the paths you care about for this change');
            }
            checklist.push('- [ ] CI checks on this PR are green');

            const body = [
              marker,
              '## PR triage',
              '',
              `**Size:** \`${size}\` · **Files:** ${files.length} · **+${pr.additions} / −${pr.deletions}** (GitHub totals)`,
              '',
              '### Areas touched',
              hit.length ? hit.map((a) => `- ${a}`).join('\n') : '- (unclassified paths)',
              '',
              '### Largest file diffs',
              '| File | Diff |',
              '|------|------|',
              top || '| — | — |',
              '',
              '### Suggested review checks',
              checklist.join('\n'),
              '',
              '_Updated automatically by `PR automation`. Edit the PR description for intent; use this for scope._',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: number, per_page: 100,
            });
            const mine = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (mine) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: mine.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: number, body,
              });
            }
