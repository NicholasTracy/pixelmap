name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required project files
        run: |
          set -euo pipefail
          for f in \
            CMakeLists.txt \
            sdkconfig.defaults \
            partitions.csv \
            main/CMakeLists.txt \
            main/main.c \
            README.md \
            LICENSE
          do
            test -f "$f" || { echo "missing: $f"; exit 1; }
          done

      - name: Verify components exist
        run: |
          set -euo pipefail
          for c in led_driver color mapping effects pov wifi_mgr web_ui artnet sacn config_store status_led; do
            test -f "components/$c/CMakeLists.txt" || { echo "missing component: $c"; exit 1; }
          done

      - name: Check for secrets / junk
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)(\.env$|\.pem$|id_rsa|secrets\.|credentials\.json$)'; then
            echo "Refusing to track secret-like files"
            exit 1
          fi

      - name: Basic C hygiene
        run: |
          set -euo pipefail
          # Fail if TODO(security) markers or obvious debug leftovers appear in shipping paths
          if grep -RIn --include='*.c' --include='*.h' -E 'gets\(|strcpy\([^,]*,\s*[^)]*password' components main; then
            echo "Potentially unsafe pattern found"
            exit 1
          fi
          echo "Hygiene checks passed"

  build:
    name: Build (${{ matrix.target }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32
            idf_version: v5.2.3
            bootloader_offset: "0x1000"
            flash_freq: 40m
          - target: esp32s3
            idf_version: v5.2.3
            bootloader_offset: "0x0"
            flash_freq: 80m
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: ${{ matrix.target }}
          path: '.'
          command: idf.py build

      - name: Create merged flash image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: ${{ matrix.target }}
          path: '.'
          command: >
            esptool.py --chip ${{ matrix.target }} merge_bin
            -o build/pixelmap-${{ matrix.target }}-merged.bin
            --flash_mode dio --flash_freq ${{ matrix.flash_freq }} --flash_size 4MB
            ${{ matrix.bootloader_offset }} build/bootloader/bootloader.bin
            0x8000 build/partition_table/partition-table.bin
            0x10000 build/pixelmap.bin
            && cp build/pixelmap.bin build/pixelmap-${{ matrix.target }}.bin
            && cp build/bootloader/bootloader.bin build/bootloader-${{ matrix.target }}.bin
            && cp build/partition_table/partition-table.bin build/partition-table-${{ matrix.target }}.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pixelmap-${{ matrix.target }}-${{ matrix.idf_version }}
          path: |
            build/pixelmap-${{ matrix.target }}.bin
            build/pixelmap-${{ matrix.target }}-merged.bin
            build/bootloader-${{ matrix.target }}.bin
            build/partition-table-${{ matrix.target }}.bin
            build/pixelmap.elf
            build/flasher_args.json
          if-no-files-found: warn
          retention-days: 14

  summary:
    name: CI summary
    needs: [lint, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "build=${{ needs.build.result }}"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.build.result }}" = "success"
